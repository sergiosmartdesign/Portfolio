  <!-- Header -->
  <text x="30" y="42" font-family="'Courier New', monospace" font-size="22" fill="#EE9B00" letter-spacing="1">[ · HOW TO EXPLORE · ]</text>
  <!-- Divider -->
  <line x1="14" y1="54" x2="530" y2="54" stroke="#0A9396" stroke-width="1" opacity="0.5"/>

  <!-- Step 01 -->
