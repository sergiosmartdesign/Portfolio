<?xml version="1.0" encoding="UTF-8"?>
<svg id="photo-section-bar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 37.5 997.6">
  <defs>
    <style>
      .psb0 { fill: none; }
      .psb1 { fill: none; stroke: #001219; stroke-dasharray: 11.9 11.9; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2px; }
      .psb2 { fill: none; stroke: #001219; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2px; }
      .psb3 { fill: #001219; }
      .psb4 { fill: #fff; }
    </style>
  </defs>

  <!-- Vertical ruled line — identical to bar2.svg -->
  <line class="psb0" x1="36.5" y1="17"    x2="36.5" y2="996.6"/>
  <line class="psb2" x1="36.5" y1="17"    x2="36.5" y2="23"/>
  <line class="psb1" x1="36.5" y1="35"    x2="36.5" y2="984.6"/>
  <line class="psb2" x1="36.5" y1="990.6" x2="36.5" y2="996.6"/>

  <!-- Dark polygon — extended vs bar2 to accommodate "Portfolio" -->
  <polygon class="psb3" points="1 362 1 1 36.5 1 36.5 392 1 362"/>

  <!-- [ · P o r t f o l i o · ]
       Center y=208 = midpoint of the usable polygon area below the star (y≈39 to y≈377).
       dominant-baseline="middle" anchors y to the true visual center of the glyphs,
       eliminating the baseline offset that occurs when text is rotated 90°.
       rotate(-90) makes the opening bracket appear at the top, matching bar2.svg orientation. -->
  <text
    transform="rotate(-90, 18.75, 208)"
    x="18.75" y="208"
    font-family="'Courier New', Courier, monospace"
    font-size="20"
    font-weight="bold"
    fill="#fff"
    text-anchor="middle"
    dominant-baseline="middle">[ · P o r t f o l i o · ]</text>

  <!-- White star — identical to bar2.svg -->
  <polygon class="psb4" points="18.7 3.6 23.1 17 37.2 17 25.8 25.3 30.1 38.7 18.7 30.4 7.3 38.7 11.7 25.3 .3 17 14.4 17 18.7 3.6"/>
</svg>
